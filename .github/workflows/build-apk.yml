name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Determine version
        id: version
        run: |
          # 如果是 tag 触发，从 tag 读取版本号；否则从 version.properties 读取
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME=$(grep "VERSION_NAME" version.properties | cut -d'=' -f2)
          fi
          echo "version=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION_NAME"

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Build web
        working-directory: web
        env:
          VITE_CURRENT_VERSION: ${{ steps.version.outputs.version }}
        run: npm run build:release

      - name: Copy web build to Android assets
        run: |
          mkdir -p app/app/src/main/assets/web
          rm -rf app/app/src/main/assets/web/*
          cp -r web/build/* app/app/src/main/assets/web/

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/app/slamibot_app.jks

      - name: Build Release APK
        working-directory: app
        env:
          KEYSTORE_PATH: slamibot_app.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew app:assembleRelease

      - name: Rename APK
        run: |
          APK_DIR="app/app/build/outputs/apk/release"
          APK_ORIGINAL="$APK_DIR/app-release.apk"
          APK_RENAMED="$APK_DIR/slamibot_v${{ steps.version.outputs.version }}.apk"
          mv "$APK_ORIGINAL" "$APK_RENAMED"
          echo "APK output: $APK_RENAMED"
          echo "apk_path=$APK_RENAMED" >> "$GITHUB_ENV"

      - name: Generate changelog
        run: |
          echo "SLAMIBot Android App v${{ steps.version.outputs.version }}" > /tmp/desc.txt
          echo "" >> /tmp/desc.txt
          echo "最近更新：" >> /tmp/desc.txt
          git log --oneline -n 5 | sed 's/^/- /' >> /tmp/desc.txt

      - name: Upload APK to server
        run: |
          curl -s -X POST "${{ secrets.UPLOAD_SERVER_URL }}" \
            -H "Authorization: Bearer ${{ secrets.UPLOAD_AUTH_TOKEN }}" \
            -F "category=app" \
            -F "description=< /tmp/desc.txt" \
            -F "release_date=$(date +%Y-%m-%d)" \
            -F "file=@${{ env.apk_path }}" \
            -w "\nHTTP_CODE: %{http_code}\n"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: slamibot-v${{ steps.version.outputs.version }}
          path: ${{ env.apk_path }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: SLAMIBot v${{ steps.version.outputs.version }}
          artifacts: ${{ env.apk_path }}
          generateReleaseNotes: true
          makeLatest: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
